spring:
  application:
    name: chat-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin123}
  config:
    import: optional:file:.env[.properties],optional:file:chat-service/.env[.properties],optional:file:Backend/chat-service/.env[.properties]

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  data:
    mongodb:
      # host: localhost
      # port: 27017
      # database: unicall_chat_service
      uri: mongodb://localhost:27017/unicall_chat_service
      auto-index-creation: true

server:
  port: 8083

api:
  prefix: /api/v1

app:
  notification:
    exchange: ${NOTIFICATION_EXCHANGE:unicall.notification.exchange}
    routing-key-prefix: ${NOTIFICATION_ROUTING_KEY_PREFIX:notification.group}
  content-moderation:
    enabled: ${CONTENT_MODERATION_ENABLED:true}
    block-on-violation: ${CONTENT_MODERATION_BLOCK_ON_VIOLATION:true}
    min-text-length: ${CONTENT_MODERATION_MIN_TEXT_LENGTH:2}
    blocked-message: ${CONTENT_MODERATION_BLOCKED_MESSAGE:Tin nhắn chứa nội dung không phù hợp (tục tĩu/18+). Vui lòng điều chỉnh trước khi gửi.}
    profanity-keywords:
      - dit
      - "dit me"
      - ditme
      - dmm
      - dcm
      - cac
      - cc
      - vcl
      - vl
      - fuck
      - fucking
      - shit
    sexual-keywords:
      - sex
      - porn
      - jav
      - "18+"
      - "khoa than"
      - "nhay cam"
      - "nguoi lon"
  websocket:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:*}
  livekit:
    enabled: ${LIVEKIT_ENABLED:true}
    url: ${LIVEKIT_URL:ws://192.168.222.128:7880}
    api-key: ${LIVEKIT_API_KEY:devkey}
    api-secret: ${LIVEKIT_API_SECRET:secret}
    token-ttl-seconds: ${LIVEKIT_TOKEN_TTL_SECONDS:3600}
  ai-assistant:
    enabled: ${AI_ASSISTANT_ENABLED:true}
    base-url: ${AI_ASSISTANT_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
    text-model: ${AI_ASSISTANT_TEXT_MODEL:gemini-2.5-flash}
    embedding-model: ${AI_ASSISTANT_EMBEDDING_MODEL:text-embedding-004}
    image-model: ${AI_ASSISTANT_IMAGE_MODEL:gemini-2.5-flash-image}
    image-provider: ${AI_IMAGE_PROVIDER:gemini}
    api-key: ${AI_ASSISTANT_API_KEY:}
    stability-base-url: ${STABILITY_BASE_URL:https://api.stability.ai}
    stability-api-key: ${STABILITY_API_KEY:}
    stability-image-model: ${STABILITY_IMAGE_MODEL:stable-image-core}
    stability-output-format: ${STABILITY_OUTPUT_FORMAT:png}
    text-system-prompt: ${AI_ASSISTANT_TEXT_SYSTEM_PROMPT:Bạn là UniCall AI, trả lời hữu ích, lịch sự bằng tiếng Việt.}
    image-system-prompt: ${AI_ASSISTANT_IMAGE_SYSTEM_PROMPT:Bạn là UniCallImage, tạo mô tả ảnh ngắn gọn bằng tiếng Việt.}
    connect-timeout-ms: ${AI_ASSISTANT_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${AI_ASSISTANT_READ_TIMEOUT_MS:30000}
    vector-enabled: ${AI_ASSISTANT_VECTOR_ENABLED:true}
    vector-candidate-limit: ${AI_ASSISTANT_VECTOR_CANDIDATE_LIMIT:120}
    vector-top-k: ${AI_ASSISTANT_VECTOR_TOP_K:6}
    vector-min-text-length: ${AI_ASSISTANT_VECTOR_MIN_TEXT_LENGTH:8}
    vector-max-new-embeddings-per-request: ${AI_ASSISTANT_VECTOR_MAX_NEW_EMBEDDINGS_PER_REQUEST:20}
    vector-min-score: ${AI_ASSISTANT_VECTOR_MIN_SCORE:0.58}
    vector-include-ai-messages: ${AI_ASSISTANT_VECTOR_INCLUDE_AI_MESSAGES:false}

grpc:
  client:
    user-service:
      address: ${USER_SERVICE_GRPC_ADDRESS:static://localhost:9091}
      negotiationType: plaintext
    friend-service:
      address: ${FRIEND_SERVICE_GRPC_ADDRESS:static://localhost:9098}
      negotiationType: plaintext
    file-service:
      address: ${FILE_SERVICE_GRPC_ADDRESS:static://localhost:9097}
      negotiationType: plaintext
  user-service:
    deadline-ms: ${USER_SERVICE_GRPC_DEADLINE_MS:5000}
  friend-service:
    deadline-ms: ${FRIEND_SERVICE_GRPC_DEADLINE_MS:5000}
  file-service:
    deadline-ms: ${FILE_SERVICE_GRPC_DEADLINE_MS:10000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG
    org.mongodb.driver.protocol.command: DEBUG
