spring:
  application:
    name: chat-service

  data:
    mongodb:
      # host: localhost
      # port: 27017
      # database: unicall_chat_service
      uri: mongodb://localhost:27017/unicall_chat_service
      auto-index-creation: true

server:
  port: 8083
  servlet:
    context-path: /chat-service

api:
  prefix: /api/v1

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG
    org.mongodb.driver.protocol.command: DEBUG
