spring:
  application:
    name: chat-service

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

  data:
    mongodb:
      # host: localhost
      # port: 27017
      # database: unicall_chat_service
      uri: mongodb://localhost:27017/unicall_chat_service
      auto-index-creation: true

server:
  port: 8083

api:
  prefix: /api/v1

app:
  websocket:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:*}

grpc:
  client:
    user-service:
      address: ${USER_SERVICE_GRPC_ADDRESS:static://localhost:9091}
      negotiationType: plaintext
    friend-service:
      address: ${FRIEND_SERVICE_GRPC_ADDRESS:static://localhost:9098}
      negotiationType: plaintext
    file-service:
      address: ${FILE_SERVICE_GRPC_ADDRESS:static://localhost:9097}
      negotiationType: plaintext
  user-service:
    deadline-ms: ${USER_SERVICE_GRPC_DEADLINE_MS:5000}
  friend-service:
    deadline-ms: ${FRIEND_SERVICE_GRPC_DEADLINE_MS:5000}
  file-service:
    deadline-ms: ${FILE_SERVICE_GRPC_DEADLINE_MS:10000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG
    org.mongodb.driver.protocol.command: DEBUG
