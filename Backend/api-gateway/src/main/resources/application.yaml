spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: identity-service
              uri: lb://IDENTITY-SERVICE
              predicates:
                - Path=/api-gateway/identity-service/**
              filters:
                - StripPrefix=1
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api-gateway/user-service/**
              filters:
                - StripPrefix=1
            - id: friend-service
              uri: lb://FRIEND-SERVICE
              predicates:
                - Path=/api-gateway/friend-service/**
              filters:
                - StripPrefix=1
            - id: file-service
              uri: lb://FILE-SERVICE
              predicates:
                - Path=/api-gateway/file-service/**
              filters:
                - StripPrefix=1
            - id: chat-service-ws
              uri: lb:ws://CHAT-SERVICE
              predicates:
                - Path=/api-gateway/chat-service/ws,/api-gateway/chat-service/ws/**
              filters:
                - StripPrefix=1
            - id: chat-service-api
              uri: lb://CHAT-SERVICE
              predicates:
                - Path=/api-gateway/chat-service/**
              filters:
                - StripPrefix=1
            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api-gateway/notification-service/**
              filters:
                - StripPrefix=1
            - id: saga-orchestrator-service
              uri: lb://SAGA-ORCHESTRATOR-SERVICE
              predicates:
                - Path=/api-gateway/saga-orchestrator-service/**
              filters:
                - StripPrefix=1
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/unicall}

server:
  port: 8088

app:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
