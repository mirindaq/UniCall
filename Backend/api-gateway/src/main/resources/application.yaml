spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  codec:
    max-in-memory-size: 25MB
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: identity-auth
              uri: lb://IDENTITY-SERVICE
              predicates:
                - Path=/api/v1/auth/**
            - id: user-users
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/v1/users/**
            - id: friend-friends
              uri: lb://FRIEND-SERVICE
              predicates:
                - Path=/api/v1/friends/**
            - id: friend-requests
              uri: lb://FRIEND-SERVICE
              predicates:
                - Path=/api/v1/friend-requestes/**
            - id: file-files
              uri: lb://FILE-SERVICE
              predicates:
                - Path=/api/v1/files/**
            - id: post-posts
              uri: lb://POST-SERVICE
              predicates:
                - Path=/api/v1/posts/**
            - id: post-comments
              uri: lb://POST-SERVICE
              predicates:
                - Path=/api/v1/comments/**
            - id: chat-ws
              uri: lb:ws://CHAT-SERVICE
              predicates:
                - Path=/ws,/ws/**
            - id: chat-api
              uri: lb://CHAT-SERVICE
              predicates:
                - Path=/api/v1/chat/**
            - id: conversation-api
              uri: lb://CHAT-SERVICE
              predicates:
                - Path=/api/v1/conversations/**
            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api-gateway/notification-service/**
              filters:
                - StripPrefix=1
            - id: saga-orchestrator-service
              uri: lb://SAGA-ORCHESTRATOR-SERVICE
              predicates:
                - Path=/api-gateway/saga-orchestrator-service/**
              filters:
                - StripPrefix=1
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/unicall}

server:
  port: 8088

app:
  security:
    cors:
      allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:*}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
