syntax = "proto3";

package unicall.user.v1;

option java_multiple_files = true;
option java_package = "iuh.fit.unicall.grpc.user.v1";
option java_outer_classname = "UserRegistrationProto";

service UserRegistrationService {
  rpc CreateUserProfile(CreateUserProfileRequest) returns (CreateUserProfileResponse);
  rpc DeleteUserProfile(DeleteUserProfileRequest) returns (DeleteUserProfileResponse);
}

message CreateUserProfileRequest {
  string identity_user_id = 1;
  string phone_number = 2;
  string first_name = 3;
  string last_name = 4;
  string gender = 5;
  string date_of_birth = 6;
}

message CreateUserProfileResponse {
  int64 id = 1;
  string identity_user_id = 2;
}

message DeleteUserProfileRequest {
  string identity_user_id = 1;
}

message DeleteUserProfileResponse {
  bool deleted = 1;
}
