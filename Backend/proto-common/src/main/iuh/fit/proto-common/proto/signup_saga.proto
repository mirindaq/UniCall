syntax = "proto3";

package unicall.saga.signup.v1;

option java_multiple_files = true;
option java_package = "iuh.fit.unicall.grpc.saga.signup.v1";
option java_outer_classname = "SignupSagaProto";

service SignupSagaService {
  rpc RegisterUser(SignupSagaRequest) returns (SignupSagaResponse);
}

message SignupSagaRequest {
  string phone_number = 1;
  string first_name = 2;
  string last_name = 3;
  string gender = 4;
  string date_of_birth = 5;
  string password = 6;
}

message SignupSagaResponse {
  string user_id = 1;
  string phone_number = 2;
  string first_name = 3;
  string last_name = 4;
  string gender = 5;
  string date_of_birth = 6;
  string message = 7;
}
