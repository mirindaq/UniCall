syntax = "proto3";

package unicall.saga.signup.v1;

option java_multiple_files = true;
option java_package = "iuh.fit.unicall.grpc.saga.signup.v1";
option java_outer_classname = "UserProto";

service UserService {
  rpc RegisterUser(UserRequest) returns (UserResponse);
}

message UserRequest {
  string identityUserId = 1;
  string phoneNumber = 2;
  string firstName = 3;
  string lastName = 4;
  string gender = 5;
  string dateOfBirth = 6;
}

message UserResponse {
  string userId = 1;
  string phoneNumber = 2;
  string firstName = 3;
  string lastName = 4;
  string gender = 5;
  string dateOfBirth = 6;
  string message = 7;
}
