spring:
  application:
    name: file-service
  servlet:
    multipart:
      max-file-size: ${FILE_MAX_SIZE:25MB}
      max-request-size: ${FILE_MAX_REQUEST_SIZE:30MB}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/unicall}

server:
  port: 8087

grpc:
  server:
    port: ${FILE_SERVICE_GRPC_PORT:9097}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

aws:
  s3:
    region: ${AWS_REGION:}
    bucket: ${AWS_S3_BUCKET:}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}