spring:
  application:
    name: saga-orchestrator-service

server:
  servlet:
    context-path: /saga-orchestrator-service
  port: 8086

grpc:
  client:
    user-service:
      address: ${USER_SERVICE_GRPC_ADDRESS:static://localhost:9091}
      negotiationType: plaintext
  server:
    port: ${SAGA_ORCHESTRATOR_GRPC_PORT:9096}
  user-service:
    deadline-ms: ${USER_SERVICE_GRPC_DEADLINE_MS:3000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

