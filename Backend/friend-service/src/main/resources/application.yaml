spring:
  application:
    name: friend-service

  datasource:
    url: jdbc:mysql://localhost:3306/unicall_friend_service?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

api:
  prefix: /api/v1

server:
  servlet:
    context-path: /friend-serivce
  port: 8082