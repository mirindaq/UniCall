spring:
  application:
    name: friend-service

  datasource:
    url: jdbc:mysql://localhost:3306/unicall_friend_service?createDatabaseIfNotExist=true
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/unicall}
api:
  prefix: /api/v1
server:
  port: 8084

grpc:
  server:
    port: ${FRIEND_SERVICE_GRPC_PORT:9098}
  user-service:
    host: ${USER_SERVICE_GRPC_HOST:localhost}
    port: ${USER_SERVICE_GRPC_PORT:9091}
    deadline-ms: ${USER_SERVICE_GRPC_DEADLINE_MS:5000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

