spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/unicall_user_service?createDatabaseIfNotExist=true
    username: springstudent
    password: springstudent
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
api:
  prefix: /api/v1
server:
  servlet:
    context-path: /user-service
  port: 8081

grpc:
  server:
    port: ${USER_SERVICE_GRPC_PORT:9091}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
