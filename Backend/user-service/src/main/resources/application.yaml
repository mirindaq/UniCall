spring:
  application:
    name: user-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/unicall}
  datasource:
    url: jdbc:mysql://localhost:3306/unicall_user_service?createDatabaseIfNotExist=true
    username: springstudent
    password: springstudent
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
api:
  prefix: /api/v1
app:
  security:
    keycloak:
      client-id: ${KEYCLOAK_CLIENT_ID:unicall-api}
server:
  servlet:
    context-path: /user-service
  port: 8081

grpc:
  server:
    port: ${USER_SERVICE_GRPC_PORT:9091}
