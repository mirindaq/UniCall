spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/unicall_user_service?createDatabaseIfNotExist=true
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
api:
  prefix: /api/v1
server:
  port: 8081

grpc:
  server:
    port: ${USER_SERVICE_GRPC_PORT:9091}
  identity-service:
    host: ${IDENTITY_SERVICE_GRPC_HOST:localhost}
    port: ${IDENTITY_SERVICE_GRPC_PORT:9092}
    deadline-ms: ${IDENTITY_SERVICE_GRPC_DEADLINE_MS:5000}
  file-service:
    host: ${FILE_SERVICE_GRPC_HOST:localhost}
    port: ${FILE_SERVICE_GRPC_PORT:9097}
    deadline-ms: ${FILE_SERVICE_GRPC_DEADLINE_MS:5000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
