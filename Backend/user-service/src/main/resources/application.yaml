spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3306/unicall_user_service?createDatabaseIfNotExist=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
api:
  prefix: /api/v1
server:
  servlet:
    context-path: /user-service
  port: 8081